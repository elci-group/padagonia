# kaptaind configuration — auto-generated by `kaptaind-cli init`

[watch]
path = "."
recursive = true
ignore_file = ".kaptainignore"

[cluster]
window = 5

[weights]
s = 0.35
a = 0.30
d = 0.20
r = 0.15

[push]
enabled = true
branch = "main"
remote = "origin"

[push.safety]
protect_branches = []

[capabilities]
network_push = true
network_webhooks = false
network_inference = false
bundle_scoring = false
external_plugins = false

[angler]
# Angler git-hooks integration is currently broken; keep the subsystem disabled.
enabled = false

[angler.git_hooks]
enabled = false

[ratelimit]
min_commit_interval = 10

[test]
command = "cargo test"
required = true

[build]
command = "cargo build --release"
artifact_path = "target/release/padagonia"
timeout_secs = 1200

[ship]
enabled = true
require_qualification = true
targets = ["x86_64-unknown-linux-gnu"]

[ship.stable]
channels = ["binaries"]
push_tag = true
release_notes = true
require_qualification = true

# [staging]
# mode = "all"        # "all" (default), "cluster" (only changed files), or "pattern"
# include = ["src/**"] # only used in "pattern" mode
# exclude = ["*.log", ".env*"]
